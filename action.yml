name: 'Rust Actions Toolkit'
description: '🦀 Simple and universal GitHub Actions toolkit for Rust projects - CI/CD, native builds, and releases'
author: 'loonghao'

inputs:
  command:
    description: 'Command to run: ci, release, or release-plz'
    required: true
    default: 'ci'

  # Common inputs
  rust-toolchain:
    description: 'Rust toolchain version'
    required: false
    default: 'stable'
  working-directory:
    description: 'Working directory for cargo commands (useful for workspace projects)'
    required: false
    default: '.'
  cargo-features:
    description: 'Cargo features to enable (e.g. "feature1,feature2" or "all")'
    required: false
    default: ''
  enable-cache:
    description: 'Enable Rust compilation cache (Swatinem/rust-cache)'
    required: false
    default: 'true'
  enable-sccache:
    description: 'Enable sccache for faster compilation'
    required: false
    default: 'false'
  setup-msvc:
    description: 'Setup MSVC developer environment on Windows (for msvc targets)'
    required: false
    default: 'false'

  # CI specific inputs
  check-format:
    description: 'Run cargo fmt --check (ci command)'
    required: false
    default: 'true'
  check-clippy:
    description: 'Run cargo clippy (ci command)'
    required: false
    default: 'true'
  check-docs:
    description: 'Run cargo doc (ci command)'
    required: false
    default: 'true'
  clippy-args:
    description: 'Additional arguments for clippy (ci command)'
    required: false
    default: '--all-targets -- -D warnings'
  use-nextest:
    description: 'Use cargo-nextest for running tests (faster parallel execution)'
    required: false
    default: 'false'
  test-args:
    description: 'Additional arguments for cargo test / nextest (ci command)'
    required: false
    default: ''

  # Release specific inputs
  binary-name:
    description: 'Binary name(s) to release, comma-separated for multiple (release command)'
    required: false
    default: ''
  enable-python-wheels:
    description: 'Enable Python wheel building (release command)'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for release uploads (release command)'
    required: false
    default: ''

  # Release-plz specific inputs
  cargo-registry-token:
    description: 'Cargo registry token for crates.io publishing (release-plz command)'
    required: false
    default: ''
  release-plz-token:
    description: 'Enhanced GitHub PAT for cross-workflow triggers (release-plz command)'
    required: false
    default: ''
  release-plz-command:
    description: 'Release-plz command: release, release-pr, or both (release-plz command)'
    required: false
    default: 'both'

outputs:
  rust-version:
    description: 'Installed Rust version'
    value: ${{ steps.rust-version.outputs.version }}
  binary-path:
    description: 'Path to the built binary (release command)'
    value: ${{ steps.build-binary.outputs.binary-path }}
  wheel-path:
    description: 'Path to the built Python wheel (release command)'
    value: ${{ steps.build-wheel.outputs.wheel-path }}
  release-created:
    description: 'Whether a release was created (release-plz command)'
    value: ${{ steps.release-plz-release.outputs.release-created }}
  pr-created:
    description: 'Whether a PR was created (release-plz command)'
    value: ${{ steps.release-plz-pr.outputs.pr-created }}
  version:
    description: 'Released version (release-plz command)'
    value: ${{ steps.release-plz-release.outputs.version }}

runs:
  using: 'composite'
  steps:
    # ========================================
    # System Dependencies
    # ========================================
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux' && inputs.command != 'release-plz'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          libssl-dev \
          curl \
          git

    # Setup MSVC developer environment on Windows
    - name: Setup MSVC developer environment
      if: runner.os == 'Windows' && inputs.setup-msvc == 'true' && inputs.command != 'release-plz'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Fix link.exe conflict on Windows
      if: runner.os == 'Windows' && inputs.setup-msvc == 'true' && inputs.command != 'release-plz'
      shell: pwsh
      run: |
        # Remove Git's usr/bin link.exe which conflicts with MSVC link.exe
        $gitPath = (Get-Command git -ErrorAction SilentlyContinue).Source
        if ($gitPath) {
          $gitDir = Split-Path (Split-Path $gitPath)
          $linkPath = Join-Path $gitDir "usr\bin\link.exe"
          if (Test-Path $linkPath) {
            Remove-Item $linkPath -Force
            Write-Host "✅ Removed conflicting Git link.exe: $linkPath"
          }
        }

    # ========================================
    # Rust Toolchain Setup (shared by ci & release)
    # ========================================
    - name: Install Rust toolchain
      if: inputs.command != 'release-plz'
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        components: rustfmt,clippy

    - name: Get Rust version
      id: rust-version
      if: inputs.command != 'release-plz'
      shell: bash
      run: |
        version=$(rustc --version)
        echo "version=$version" >> $GITHUB_OUTPUT
        echo "🦀 Installed Rust: $version"
        echo "📦 Cargo version: $(cargo --version)"

    - name: Rust cache
      if: inputs.command != 'release-plz' && inputs.enable-cache == 'true'
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "rust-toolkit-${{ inputs.command }}"
        workspaces: "${{ inputs.working-directory }} -> target"

    # sccache setup (optional, for large projects)
    - name: Setup sccache
      if: inputs.command != 'release-plz' && inputs.enable-sccache == 'true'
      uses: mozilla-actions/sccache-action@v0.0.6

    - name: Configure sccache env
      if: inputs.command != 'release-plz' && inputs.enable-sccache == 'true'
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    # ========================================
    # CI Steps
    # ========================================
    - name: Check formatting
      if: inputs.command == 'ci' && inputs.check-format == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "🎨 Checking code formatting..."
        cargo fmt --all --check

    - name: Run clippy
      if: inputs.command == 'ci' && inputs.check-clippy == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "📎 Running clippy lints..."
        FEATURES_FLAG=""
        if [ "${{ inputs.cargo-features }}" = "all" ]; then
          FEATURES_FLAG="--all-features"
        elif [ -n "${{ inputs.cargo-features }}" ]; then
          FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
        fi
        cargo clippy --workspace $FEATURES_FLAG ${{ inputs.clippy-args }}

    - name: Check documentation
      if: inputs.command == 'ci' && inputs.check-docs == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        RUSTDOCFLAGS: -D warnings
      run: |
        echo "📚 Checking documentation..."
        FEATURES_FLAG=""
        if [ "${{ inputs.cargo-features }}" = "all" ]; then
          FEATURES_FLAG="--all-features"
        elif [ -n "${{ inputs.cargo-features }}" ]; then
          FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
        fi
        cargo doc --no-deps --document-private-items --workspace $FEATURES_FLAG

    # Install nextest if needed
    - name: Install cargo-nextest
      if: inputs.command == 'ci' && inputs.use-nextest == 'true'
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Run tests (nextest)
      if: inputs.command == 'ci' && inputs.use-nextest == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "🧪 Running tests with cargo-nextest..."
        FEATURES_FLAG=""
        if [ "${{ inputs.cargo-features }}" = "all" ]; then
          FEATURES_FLAG="--all-features"
        elif [ -n "${{ inputs.cargo-features }}" ]; then
          FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
        fi
        cargo nextest run --workspace $FEATURES_FLAG ${{ inputs.test-args }}

    - name: Run tests (cargo test)
      if: inputs.command == 'ci' && inputs.use-nextest != 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "🧪 Running tests..."
        FEATURES_FLAG=""
        if [ "${{ inputs.cargo-features }}" = "all" ]; then
          FEATURES_FLAG="--all-features"
        elif [ -n "${{ inputs.cargo-features }}" ]; then
          FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
        fi
        cargo test --verbose --workspace $FEATURES_FLAG ${{ inputs.test-args }}

    # ========================================
    # Release Steps
    # ========================================
    - name: Build and upload binary
      id: build-binary
      if: inputs.command == 'release'
      uses: taiki-e/upload-rust-binary-action@v1
      with:
        bin: ${{ inputs.binary-name }}
        tar: all
        zip: windows
        token: ${{ inputs.github-token }}

    # Python wheel building (optional)
    - name: Check for pyproject.toml
      id: check-pyproject
      if: inputs.command == 'release' && inputs.enable-python-wheels == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ -f "pyproject.toml" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "🐍 pyproject.toml found, proceeding with Python wheel build"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "⚠️ pyproject.toml not found, skipping Python wheel build"
        fi

    - name: Set up Python
      if: inputs.command == 'release' && inputs.enable-python-wheels == 'true' && steps.check-pyproject.outputs.exists == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install maturin
      if: inputs.command == 'release' && inputs.enable-python-wheels == 'true' && steps.check-pyproject.outputs.exists == 'true'
      shell: bash
      run: pip install maturin[patchelf]

    - name: Build Python wheels
      id: build-wheel
      if: inputs.command == 'release' && inputs.enable-python-wheels == 'true' && steps.check-pyproject.outputs.exists == 'true'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        maturin build --release
        wheel_path=$(find target/wheels -name "*.whl" | head -1)
        echo "wheel-path=$wheel_path" >> $GITHUB_OUTPUT

    - name: Upload wheels to release
      if: inputs.command == 'release' && inputs.enable-python-wheels == 'true' && steps.check-pyproject.outputs.exists == 'true' && steps.build-wheel.outputs.wheel-path != ''
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.build-wheel.outputs.wheel-path }}
        token: ${{ inputs.github-token }}

    # ========================================
    # Release-plz Steps
    # ========================================
    - name: Checkout repository (for release-plz)
      if: inputs.command == 'release-plz'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ inputs.release-plz-token || inputs.github-token }}

    - name: Install Rust toolchain (for release-plz)
      if: inputs.command == 'release-plz'
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Run release-plz release
      id: release-plz-release
      if: inputs.command == 'release-plz' && (inputs.release-plz-command == 'release' || inputs.release-plz-command == 'both')
      uses: release-plz/action@v0.5
      with:
        command: release
      env:
        GITHUB_TOKEN: ${{ inputs.release-plz-token || inputs.github-token }}
        CARGO_REGISTRY_TOKEN: ${{ inputs.cargo-registry-token }}

    - name: Run release-plz release-pr
      id: release-plz-pr
      if: inputs.command == 'release-plz' && (inputs.release-plz-command == 'release-pr' || inputs.release-plz-command == 'both')
      uses: release-plz/action@v0.5
      with:
        command: release-pr
      env:
        GITHUB_TOKEN: ${{ inputs.release-plz-token || inputs.github-token }}
        CARGO_REGISTRY_TOKEN: ${{ inputs.cargo-registry-token }}

    - name: Output release-plz results
      if: inputs.command == 'release-plz'
      shell: bash
      run: |
        echo "Release-plz completed successfully!"
        if [[ "${{ inputs.release-plz-command }}" == "release" || "${{ inputs.release-plz-command }}" == "both" ]]; then
          echo "Release command executed"
        fi
        if [[ "${{ inputs.release-plz-command }}" == "release-pr" || "${{ inputs.release-plz-command }}" == "both" ]]; then
          echo "Release PR command executed"
        fi

branding:
  icon: 'package'
  color: 'orange'
