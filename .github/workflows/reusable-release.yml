name: Reusable Release

# Universal reusable release workflow for Rust projects
# Supports: multi-platform native builds, Python wheels, MSVC, static linking
#
# IMPORTANT: This workflow inlines all steps directly (not via `uses: ./`)
# to ensure correct behavior when called from external repositories.

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: 'Rust toolchain version'
        required: false
        type: string
        default: 'stable'
      binary-name:
        description: 'Binary name(s) to release, comma-separated (auto-detected if not specified)'
        required: false
        type: string
        default: ''
      working-directory:
        description: 'Working directory for cargo commands'
        required: false
        type: string
        default: '.'
      enable-python-wheels:
        description: 'Enable Python wheel building and uploading'
        required: false
        type: boolean
        default: false
      setup-msvc:
        description: 'Setup MSVC developer environment on Windows'
        required: false
        type: boolean
        default: false
      target-platforms:
        description: |
          JSON array of target platforms to build for.
          Each entry: {"target": "<rust-target>", "os": "<github-runner>"}
          Default builds for Linux (gnu + musl), macOS (x64 + ARM), Windows (MSVC)
        required: false
        type: string
        default: |
          [
            {"target": "x86_64-unknown-linux-gnu", "os": "ubuntu-22.04"},
            {"target": "x86_64-unknown-linux-musl", "os": "ubuntu-22.04"},
            {"target": "aarch64-unknown-linux-gnu", "os": "ubuntu-22.04"},
            {"target": "aarch64-unknown-linux-musl", "os": "ubuntu-22.04"},
            {"target": "x86_64-apple-darwin", "os": "macos-13"},
            {"target": "aarch64-apple-darwin", "os": "macos-14"},
            {"target": "x86_64-pc-windows-msvc", "os": "windows-2022"},
            {"target": "aarch64-pc-windows-msvc", "os": "windows-2022"}
          ]
    # Note: GITHUB_TOKEN is automatically provided by GitHub Actions

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_HTTP_TIMEOUT: 600
  CARGO_NET_RETRY: 10

jobs:
  # ==========================================
  # Native binary release builds
  # ==========================================
  release:
    name: Release (${{ matrix.platform.target }})
    if: startsWith(github.ref_name, 'v')
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(inputs.target-platforms) }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      # Cross-compilation setup for Linux targets
      - name: Setup cross-compilation toolchain
        uses: taiki-e/setup-cross-toolchain-action@20dbac418ca692fd1a9377acf2cec38161169a39 # v1
        with:
          target: ${{ matrix.platform.target }}
        if: startsWith(matrix.platform.os, 'ubuntu') && !contains(matrix.platform.target, '-musl')

      - name: Install cross for musl targets
        uses: taiki-e/install-action@b988c18e3de947a10207d5289ed90fae4e2c51f1 # v2
        with:
          tool: cross
        if: contains(matrix.platform.target, '-musl')

      # MSVC setup for Windows
      - name: Setup MSVC developer environment
        if: inputs.setup-msvc && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1

      - name: Fix link.exe conflict on Windows
        if: inputs.setup-msvc && runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitPath = (Get-Command git -ErrorAction SilentlyContinue).Source
          if ($gitPath) {
            $gitDir = Split-Path (Split-Path $gitPath)
            $linkPath = Join-Path $gitDir "usr\bin\link.exe"
            if (Test-Path $linkPath) {
              Remove-Item $linkPath -Force
              Write-Host "Removed conflicting Git link.exe"
            }
          }

      # Static linking for Windows MSVC targets
      - name: Configure Windows static linking
        if: endsWith(matrix.platform.target, 'windows-msvc')
        shell: bash
        run: echo "RUSTFLAGS=${RUSTFLAGS} -C target-feature=+crt-static" >> "${GITHUB_ENV}"

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
          workspaces: "${{ inputs.working-directory }} -> target"

      # Upload binary assets (auto-detects binary name from Cargo.toml)
      - name: Upload binary assets
        uses: taiki-e/upload-rust-binary-action@0e34102c043ded9f2ca39f7af5cd99a540c61aff # v1
        with:
          bin: ${{ inputs.binary-name }}
          target: ${{ matrix.platform.target }}
          tar: all
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # Python wheels (optional)
  # ==========================================
  python-wheels:
    name: Python Wheel (${{ matrix.platform.target }})
    if: startsWith(github.ref_name, 'v') && inputs.enable-python-wheels
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for pyproject.toml
        id: check-pyproject
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          if [ -f "pyproject.toml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ pyproject.toml found"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ pyproject.toml not found, skipping"
          fi

      - name: Set up Python
        if: steps.check-pyproject.outputs.exists == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install Rust toolchain
        if: steps.check-pyproject.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Setup cross-compilation (Linux ARM64)
        if: steps.check-pyproject.outputs.exists == 'true' && matrix.platform.os == 'ubuntu-latest' && matrix.platform.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install maturin
        if: steps.check-pyproject.outputs.exists == 'true'
        shell: bash
        run: pip install maturin[patchelf]

      - name: Build Python wheels
        if: steps.check-pyproject.outputs.exists == 'true'
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: maturin build --release --target ${{ matrix.platform.target }}

      - name: Upload wheels to release
        if: steps.check-pyproject.outputs.exists == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: target/wheels/*.whl
          token: ${{ secrets.GITHUB_TOKEN }}
