name: Core CI

# Reusable workflow for core Rust CI functionality
# Zero configuration with sensible defaults, optimized for speed and reliability
# Uses vx (Universal Development Tool Manager) for consistent toolchain management
# Supports: workspace projects, cargo features, nextest, MSVC

on:
  workflow_call:
    inputs:
      rust-toolchain:
        description: 'Rust toolchain version'
        required: false
        type: string
        default: 'stable'
      working-directory:
        description: 'Working directory for cargo commands (workspace projects)'
        required: false
        type: string
        default: '.'
      cargo-features:
        description: 'Cargo features to enable ("all" for --all-features, or comma-separated list)'
        required: false
        type: string
        default: ''
      use-nextest:
        description: 'Use cargo-nextest for faster parallel test execution'
        required: false
        type: boolean
        default: false
      enable-coverage:
        description: 'Enable code coverage reporting'
        required: false
        type: boolean
        default: true
      enable-audit:
        description: 'Enable security audit'
        required: false
        type: boolean
        default: true
      setup-msvc:
        description: 'Setup MSVC developer environment (Windows-only projects)'
        required: false
        type: boolean
        default: false
      runner:
        description: 'Runner OS for CI (e.g. ubuntu-22.04, windows-latest)'
        required: false
        type: string
        default: 'ubuntu-22.04'
      clippy-args:
        description: 'Additional arguments for clippy'
        required: false
        type: string
        default: '--all-targets -- -D warnings'
      test-args:
        description: 'Additional arguments for test runner'
        required: false
        type: string
        default: ''
    secrets:
      CODECOV_TOKEN:
        description: 'Codecov token for coverage reporting'
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_HTTP_TIMEOUT: 600
  CARGO_NET_RETRY: 10

jobs:
  ci:
    name: Core CI
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # MSVC setup for Windows-only projects (like msvc-kit)
      - name: Setup MSVC developer environment
        if: inputs.setup-msvc && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fix link.exe conflict on Windows
        if: inputs.setup-msvc && runner.os == 'Windows'
        shell: pwsh
        run: |
          $gitPath = (Get-Command git -ErrorAction SilentlyContinue).Source
          if ($gitPath) {
            $gitDir = Split-Path (Split-Path $gitPath)
            $linkPath = Join-Path $gitDir "usr\bin\link.exe"
            if (Test-Path $linkPath) {
              Remove-Item $linkPath -Force
              Write-Host "Removed conflicting Git link.exe"
            }
          }

      # vx - Universal Tool Manager (replaces dtolnay/rust-toolchain + rust-cache + sccache)
      - name: Setup vx
        uses: loonghao/vx@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check formatting
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "🎨 Checking code formatting..."
          vx cargo fmt --all -- --check

      - name: Run Clippy
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "📎 Running Clippy..."
          FEATURES_FLAG=""
          if [ "${{ inputs.cargo-features }}" = "all" ]; then
            FEATURES_FLAG="--all-features"
          elif [ -n "${{ inputs.cargo-features }}" ]; then
            FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
          fi
          vx cargo clippy --workspace ${FEATURES_FLAG:+"$FEATURES_FLAG"} ${{ inputs.clippy-args }}

      - name: Check documentation
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          echo "📚 Checking documentation..."
          FEATURES_FLAG=""
          if [ "${{ inputs.cargo-features }}" = "all" ]; then
            FEATURES_FLAG="--all-features"
          elif [ -n "${{ inputs.cargo-features }}" ]; then
            FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
          fi
          vx cargo doc --no-deps --document-private-items --workspace ${FEATURES_FLAG:+"$FEATURES_FLAG"}

      # Install nextest via install-action (much faster than cargo install)
      - name: Install cargo-nextest
        if: inputs.use-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests (nextest)
        if: inputs.use-nextest
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "🧪 Running tests with cargo-nextest..."
          FEATURES_FLAG=""
          if [ "${{ inputs.cargo-features }}" = "all" ]; then
            FEATURES_FLAG="--all-features"
          elif [ -n "${{ inputs.cargo-features }}" ]; then
            FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
          fi
          vx cargo nextest run --workspace ${FEATURES_FLAG:+"$FEATURES_FLAG"} ${{ inputs.test-args }}

      - name: Run tests (cargo test)
        if: ${{ !inputs.use-nextest }}
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "🧪 Running tests..."
          FEATURES_FLAG=""
          if [ "${{ inputs.cargo-features }}" = "all" ]; then
            FEATURES_FLAG="--all-features"
          elif [ -n "${{ inputs.cargo-features }}" ]; then
            FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
          fi
          vx cargo test --workspace ${FEATURES_FLAG:+"$FEATURES_FLAG"} ${{ inputs.test-args }}

      # Security audit via install-action (faster)
      - name: Install cargo-audit
        if: inputs.enable-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Security audit
        if: inputs.enable-audit
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "🔒 Running security audit..."
          vx cargo audit

      # Coverage via install-action
      - name: Install cargo-llvm-cov
        if: inputs.enable-coverage
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Code coverage
        if: inputs.enable-coverage
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          echo "📊 Generating code coverage..."
          FEATURES_FLAG=""
          if [ "${{ inputs.cargo-features }}" = "all" ]; then
            FEATURES_FLAG="--all-features"
          elif [ -n "${{ inputs.cargo-features }}" ]; then
            FEATURES_FLAG="--features ${{ inputs.cargo-features }}"
          fi
          vx cargo llvm-cov --workspace ${FEATURES_FLAG:+"$FEATURES_FLAG"} --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: inputs.enable-coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

      - name: CI Summary
        shell: bash
        run: |
          {
            echo "## ✅ Core CI Results"
            echo ""
            echo "| Check | Status |"
            echo "|-------|--------|"
            echo "| Code formatting | ✅ Passed |"
            echo "| Clippy lints | ✅ Passed |"
            echo "| Documentation | ✅ Passed |"
            echo "| Tests | ✅ Passed |"
            if [ "${{ inputs.enable-audit }}" = "true" ]; then
              echo "| Security audit | ✅ Passed |"
            fi
            if [ "${{ inputs.enable-coverage }}" = "true" ]; then
              echo "| Code coverage | ✅ Generated |"
            fi
            echo ""
            echo "**Toolchain:** ${{ inputs.rust-toolchain }} | **Runner:** ${{ inputs.runner }}"
          } >> "$GITHUB_STEP_SUMMARY"
