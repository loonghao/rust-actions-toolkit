name: Release

# Universal release workflow for Rust projects
# Triggered by release-plz when it creates a tag
# Supports: binary releases, Python wheels, cross-platform compilation

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_HTTP_TIMEOUT: 600
  CARGO_NET_RETRY: 10
  RUSTFLAGS: -D warnings

jobs:
  # Upload binary assets for projects with binaries
  upload-binary-assets:
    name: Upload binary (${{ matrix.target }})
    if: startsWith(github.ref_name, 'v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux targets
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
          # macOS targets
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-14
          # Windows targets
          - target: x86_64-pc-windows-msvc
            os: windows-2022
          - target: aarch64-pc-windows-msvc
            os: windows-2022
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cross-compilation toolchain
        uses: taiki-e/setup-cross-toolchain-action@20dbac418ca692fd1a9377acf2cec38161169a39 # v1
        with:
          target: ${{ matrix.target }}
        if: startsWith(matrix.os, 'ubuntu') && !contains(matrix.target, '-musl')

      - name: Install cross for musl targets
        uses: taiki-e/install-action@b988c18e3de947a10207d5289ed90fae4e2c51f1 # v2
        with:
          tool: cross
        if: contains(matrix.target, '-musl')

      - name: Configure Windows static linking
        run: echo "RUSTFLAGS=${RUSTFLAGS} -C target-feature=+crt-static" >> "${GITHUB_ENV}"
        if: endsWith(matrix.target, 'windows-msvc')

      - name: Upload binary assets
        uses: taiki-e/upload-rust-binary-action@0e34102c043ded9f2ca39f7af5cd99a540c61aff # v1
        with:
          target: ${{ matrix.target }}
          tar: all
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  # Build and upload Python wheels (conditional)
  upload-python-wheels:
    name: Python Wheel (${{ matrix.target }})
    if: startsWith(github.ref_name, 'v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check for pyproject.toml
        id: check-pyproject
        shell: bash
        run: |
          if [ -f "pyproject.toml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ pyproject.toml found"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ pyproject.toml not found, skipping"
            exit 0
          fi

      - name: Set up Python
        if: steps.check-pyproject.outputs.exists == 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.13'

      - name: Install Rust toolchain
        if: steps.check-pyproject.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup cross-compilation (Linux ARM64)
        if: steps.check-pyproject.outputs.exists == 'true' && matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Install maturin
        if: steps.check-pyproject.outputs.exists == 'true'
        shell: bash
        run: pip install maturin[patchelf]

      - name: Build Python wheels
        if: steps.check-pyproject.outputs.exists == 'true'
        shell: bash
        run: maturin build --release --target ${{ matrix.target }}

      - name: Upload wheels to release
        if: steps.check-pyproject.outputs.exists == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: target/wheels/*.whl
          token: ${{ secrets.GITHUB_TOKEN }}
